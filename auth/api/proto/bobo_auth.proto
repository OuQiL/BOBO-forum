syntax = "proto3";

package auth.v1;

option go_package = "auth/api/proto";

message RegisterRequest {
    string username = 1;
    string password = 2;
    string email = 3;
}


message LoginRequest {
    string username = 1;
    string password = 2;
}

message LoginResponse {
    string token = 1;
    UserInfo user_info = 2;
}

message UserInfo {
    int64 id = 1;
    string username = 2;
    string email = 3;
}

service Auth {
    rpc Register(RegisterRequest) returns (LoginResponse);
    rpc Login(LoginRequest) returns (LoginResponse);
}
