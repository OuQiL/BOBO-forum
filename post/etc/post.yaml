Name: post
ListenOn: 0.0.0.0:8002

MySQL:
  DataSource: root:li200602@tcp(${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306})/${MYSQL_DATABASE:bobo_db}?charset=utf8mb4&parseTime=true&loc=Local
  MaxOpenConns: 100
  MaxIdleConns: 10
  ConnMaxLifetime: 3600
  ConnMaxIdleTime: 600

RedisConf:
  Host: ${REDIS_HOST:127.0.0.1}:${REDIS_PORT:6379}
  Type: node
  Pass: ""

Cache:
  HotPostCacheTTL: 300
  HotPostMaxEntries: 1000
  HotPostThreshold: 10

Bloom:
  ExpectedItems: 1000000
  FalsePositiveRate: 0.01

Log:
  File: post.log

CpuThreshold: 0
Timeout: 30000
MaxConns: 10000
